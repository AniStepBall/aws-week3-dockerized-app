name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t bobbysmith0/week3-flask-app:latest .

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u bobbysmith0 --password-stdin

      - name: Push image
        run: docker push bobbysmith0/week3-flask-app:latest

      - name: Deploy on EC2
        uses: appleboy/ssh-action@master
        with:
            host: ${{ secrets.EC2_HOST }}
            username: ec2-user
            key: ${{ secrets.EC2_KEY }}
            script: |
              docker pull bobbysmith0/week3-flask-app:latest
              docker stop $(docker ps -q)
              docker run -d -p 80:5000 bobbysmith0/week3-flask-app:latest
